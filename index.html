<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Day</title>
</head>
<body>

  <h1>Career Day</h1>

  <input type="text" id="studentName" placeholder="Enter your name...">

  <br><br>

  <button onclick="handleSubmit()">Submit</button>
  <button onclick="handleClear()">Clear</button>

  <div id="choiceSection" style="display:none; margin-top: 1rem;">
    <h2>Who are you?</h2>
    <button onclick="pickRandom('pokemon')">Which Pokémon are you?</button>
    <button onclick="pickRandom('princess')">Which Disney Princess are you?</button>
  </div>

  <div id="characterResult" style="margin-top: 1rem;">
    <p id="output"></p>
    <p id="characterName"></p>
    <img id="characterImage" src="" alt="" style="display:none; width: 200px; border-radius: 8px;">
  </div>

  <script>
    const descriptions = [
      "awesome", "brilliant", "amazing", "wonderful", "fantastic",
      "beautiful", "smart", "incredible", "superstar", "unstoppable"
    ];

    const pokemon = [
      { name: "Pikachu",    image: "images/pokemon/pikachu.png" },
      { name: "Eevee",      image: "images/pokemon/eevee.png" },
      { name: "Jigglypuff", image: "images/pokemon/jigglypuff.png" },
      { name: "Bulbasaur",  image: "images/pokemon/bulbasaur.png" },
      { name: "Charmander", image: "images/pokemon/charmander.png" },
      { name: "Squirtle",   image: "images/pokemon/squirtle.png" },
      { name: "Mewtwo",     image: "images/pokemon/mewtwo.png" },
      { name: "Snorlax",    image: "images/pokemon/snorlax.png" },
    ];

    const princesses = [
      { name: "Moana",      image: "images/princesses/moana.png" },
      { name: "Mulan",      image: "images/princesses/mulan.png" },
      { name: "Tiana",      image: "images/princesses/tiana.png" },
      { name: "Rapunzel",   image: "images/princesses/rapunzel.png" },
      { name: "Merida",     image: "images/princesses/merida.png" },
      { name: "Cinderella", image: "images/princesses/cinderella.png" },
    ];

    function handleSubmit() {
      const name = document.getElementById('studentName').value.trim();
      if (!name) {
        alert('Please enter your name first!');
        return;
      }
      document.getElementById('choiceSection').style.display = 'block';
      document.getElementById('characterName').textContent = '';
      document.getElementById('characterImage').style.display = 'none';
      document.getElementById('output').textContent = '';
    }

    function handleClear() {
      document.getElementById('studentName').value = '';
      document.getElementById('output').textContent = '';
      document.getElementById('choiceSection').style.display = 'none';
      document.getElementById('characterName').textContent = '';
      document.getElementById('characterImage').style.display = 'none';
    }

    function pickRandom(type) {
      const name = document.getElementById('studentName').value.trim();
      const list = type === 'pokemon' ? pokemon : princesses;
      const pick = list[Math.floor(Math.random() * list.length)];
      const word = descriptions[Math.floor(Math.random() * descriptions.length)];

      document.getElementById('output').textContent = `Hey ${name} you are ${word}!!!`;
      document.getElementById('characterName').textContent = `You are ${pick.name}!`;
      const img = document.getElementById('characterImage');
      img.src = pick.image;
      img.alt = pick.name;
      img.style.display = 'block';
    }
  </script>

</body>
</html>
