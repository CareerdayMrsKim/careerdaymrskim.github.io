<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Day</title>
</head>
<body>
  <h1>Mrs. Kim's BEST 1st Grade's Career Day</h1>
  <p>Let's enter your name to get started!</p>

  <input type="text" id="studentName" placeholder="Your name..." />
  <button onclick="handleSubmit()">Let's Go!</button>
  <button onclick="handleClear()">Clear</button>

  <div id="choiceSection" style="display:none;">
    <p>What do you love more?</p>
    <button onclick="pickRandom('pokemon')">Pokemon</button>
    <button onclick="pickRandom('princess')">Disney Princess</button>
  </div>

  <div id="resultCard" style="display:none;">
    <p id="greeting"></p>
    <p id="charName"></p>
    <img id="charImage" src="" alt="" style="width:200px;" />
    <p id="compliment"></p>
  </div>

  <script>
    const pokemon = [
      { name: "Pikachu",    image: "assets/pokemon/pikachu.png",    compliment: "PLACEHOLDER: Pikachu compliment" },
      { name: "Eevee",      image: "assets/pokemon/eevee.png",      compliment: "PLACEHOLDER: Eevee compliment" },
      { name: "Jigglypuff", image: "assets/pokemon/jigglypuff.png", compliment: "PLACEHOLDER: Jigglypuff compliment" },
      { name: "Bulbasaur",  image: "assets/pokemon/bulbasaur.png",  compliment: "PLACEHOLDER: Bulbasaur compliment" },
      { name: "Charmander", image: "assets/pokemon/charmander.png", compliment: "PLACEHOLDER: Charmander compliment" },
      { name: "Squirtle",   image: "assets/pokemon/squirtle.png",   compliment: "PLACEHOLDER: Squirtle compliment" },
      { name: "Mewtwo",     image: "assets/pokemon/mewtwo.png",     compliment: "PLACEHOLDER: Mewtwo compliment" },
      { name: "Snorlax",    image: "assets/pokemon/snorlax.png",    compliment: "PLACEHOLDER: Snorlax compliment" },
    ];

    const princesses = [
      { name: "Moana",      image: "assets/princesses/moana.png",      compliment: "PLACEHOLDER: Moana compliment" },
      { name: "Mulan",      image: "assets/princesses/mulan.png",      compliment: "PLACEHOLDER: Mulan compliment" },
      { name: "Tiana",      image: "assets/princesses/tiana.png",      compliment: "PLACEHOLDER: Tiana compliment" },
      { name: "Rapunzel",   image: "assets/princesses/rapunzel.png",   compliment: "PLACEHOLDER: Rapunzel compliment" },
      { name: "Merida",     image: "assets/princesses/merida.png",     compliment: "PLACEHOLDER: Merida compliment" },
      { name: "Cinderella", image: "assets/princesses/cinderella.png", compliment: "PLACEHOLDER: Cinderella compliment" },
      { name: "Ariel",      image: "assets/princesses/Ariel.png",      compliment: "PLACEHOLDER: Ariel compliment" },
      { name: "Belle",       image: "assets/princesses/Belle.png",     compliment: "PLACEHOLDER: Belle compliment" },
    ];

    function handleSubmit() {
      const name = document.getElementById('studentName').value.trim();
      if (!name) { alert('Please enter your name first!'); return; }
      document.getElementById('choiceSection').style.display = 'block';
      document.getElementById('resultCard').style.display = 'none';
    }

    function handleClear() {
      document.getElementById('studentName').value = '';
      document.getElementById('choiceSection').style.display = 'none';
      document.getElementById('resultCard').style.display = 'none';
    }

    function pickRandom(type) {
      const name = document.getElementById('studentName').value.trim();
      const list = type === 'pokemon' ? pokemon : princesses;
      const pick = list[Math.floor(Math.random() * list.length)];
      document.getElementById('greeting').textContent = `Hey ${name}!`;
      document.getElementById('charName').textContent = `You are ${pick.name}!`;
      document.getElementById('charImage').src = pick.image;
      document.getElementById('charImage').alt = pick.name;
      document.getElementById('compliment').textContent = pick.compliment;
      document.getElementById('resultCard').style.display = 'block';
    }
  </script>
</body>
</html>
