<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Day</title>
</head>
<body>
  <h1>Mrs. Kim's Career Day</h1>
  <p>1st Grade — Enter your name to get started!</p>

  <input type="text" id="studentName" placeholder="Your name..." />
  <button onclick="handleSubmit()">Go!</button>
  <button onclick="handleClear()">Clear</button>

  <div id="choiceSection" style="display:none;">
    <p>What do you love more?</p>
    <button onclick="pickRandom('pokemon')">Pokemon</button>
    <button onclick="pickRandom('princess')">Disney Princess</button>
  </div>

  <div id="resultCard" style="display:none;">
    <p id="greeting"></p>
    <p id="charName"></p>
    <p id="compliment"></p>
  </div>

  <script>
    const pokemon = [
      { name: "Pikachu",    emoji: "⚡", compliment: "PLACEHOLDER: Pikachu compliment" },
      { name: "Eevee",      emoji: "🦊", compliment: "PLACEHOLDER: Eevee compliment" },
      { name: "Jigglypuff", emoji: "🎵", compliment: "PLACEHOLDER: Jigglypuff compliment" },
      { name: "Bulbasaur",  emoji: "🌿", compliment: "PLACEHOLDER: Bulbasaur compliment" },
      { name: "Charmander", emoji: "🔥", compliment: "PLACEHOLDER: Charmander compliment" },
      { name: "Squirtle",   emoji: "💧", compliment: "PLACEHOLDER: Squirtle compliment" },
      { name: "Mewtwo",     emoji: "🔮", compliment: "PLACEHOLDER: Mewtwo compliment" },
      { name: "Snorlax",    emoji: "😴", compliment: "PLACEHOLDER: Snorlax compliment" },
    ];

    const princesses = [
      { name: "Moana",      emoji: "🌊", compliment: "PLACEHOLDER: Moana compliment" },
      { name: "Mulan",      emoji: "🏮", compliment: "PLACEHOLDER: Mulan compliment" },
      { name: "Tiana",      emoji: "🐸", compliment: "PLACEHOLDER: Tiana compliment" },
      { name: "Rapunzel",   emoji: "🌸", compliment: "PLACEHOLDER: Rapunzel compliment" },
      { name: "Merida",     emoji: "🏹", compliment: "PLACEHOLDER: Merida compliment" },
      { name: "Cinderella", emoji: "👠", compliment: "PLACEHOLDER: Cinderella compliment" },
    ];

    function handleSubmit() {
      const name = document.getElementById('studentName').value.trim();
      if (!name) { alert('Please enter your name first!'); return; }
      document.getElementById('choiceSection').style.display = 'block';
      document.getElementById('resultCard').style.display = 'none';
    }

    function handleClear() {
      document.getElementById('studentName').value = '';
      document.getElementById('choiceSection').style.display = 'none';
      document.getElementById('resultCard').style.display = 'none';
    }

    function pickRandom(type) {
      const name = document.getElementById('studentName').value.trim();
      const list = type === 'pokemon' ? pokemon : princesses;
      const pick = list[Math.floor(Math.random() * list.length)];
      document.getElementById('greeting').textContent = `Hey ${name}!`;
      document.getElementById('charName').textContent = `You are ${pick.name}! ${pick.emoji}`;
      document.getElementById('compliment').textContent = pick.compliment;
      document.getElementById('resultCard').style.display = 'block';
    }
  </script>
</body>
</html>
