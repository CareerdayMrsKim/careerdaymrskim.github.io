<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Day</title>
</head>
<body>

  <h1>Mrs. Kim's 1st Grade Career Day</h1>

  <textarea id="careerInput" rows="6" placeholder="Type your jobs here, one per line..."></textarea>

  <br><br>

  <button onclick="handleSubmit()">Submit</button>
  <button onclick="handleClear()">Clear</button>

  <p id="output"></p>

  <script>
    function handleSubmit() {
      const val = document.getElementById('careerInput').value.trim();
      const out = document.getElementById('output');
      if (!val) {
        out.textContent = 'Please enter something first!';
        return;
      }
      const lines = val.split('\n').filter(l => l.trim());
      out.textContent = lines.length + ' item(s) submitted!';
    }

    function handleClear() {
      document.getElementById('careerInput').value = '';
      document.getElementById('output').textContent = '';
    }
  </script>

</body>
</html>
